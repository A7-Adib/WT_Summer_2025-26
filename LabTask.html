<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Task</title>
</head>
<body>
    <header>

    </header>
    <main>
        <h2>Internship Availability Confirmation Form</h2>

        <form>
    
            <label for="name">Student Name:</label><br>
            <input type="text" id="name" name="name" required placeholder="Name"><br><br>
    
            <label for="email">Email Address:</label><br>
            <input type="email" id="email" name="email" required placeholder="Email"><br><br>
    
            <label>Preferred Internship Type:</label><br>
            <input type="radio" id="onsite" name="internship_type" value="On-Site">
            <label for="onsite">On-Site</label><br>
    
            <input type="radio" id="remote" name="internship_type" value="Remote">
            <label for="remote">Remote</label><br><br>
    
            <label for="duration">Internship Duration:</label><br>
            <select id="duration" name="duration">
                <option value="6-Weeks">6 Weeks</option>
                <option value="3-Months">3 Months</option>
            </select><br><br>
    
            <label>Skills of Interest:</label><br>
            <input type="checkbox" id="web" name="skills" value="Web-Development">
            <label for="web">Web Development</label><br>
    
            <input type="checkbox" id="data" name="skills" value="Data-Analysis">
            <label for="data">Data Analysis</label><br>
    
            <input type="checkbox" id="mobile" name="skills" value="Mobile-Apps">
            <label for="mobile">Mobile Apps</label><br><br>
    
            <input type="submit" value="Submit">
    
        </form>
    
    </main>
    <footer>

    </footer>
</body>
</html>
